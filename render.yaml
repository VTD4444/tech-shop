# Render Blueprint — TechShop backend + AI (Docker images from GHCR)
#
# Before applying:
# 1. Replace YOUR_GITHUB_USERNAME with your GitHub org/user (lowercase).
# 2. In Render Dashboard → each service → Environment: set secrets (DATABASE_URL, JWT_*, SePay, etc.).
# 3. Link GHCR registry: Settings → Registry credentials → GitHub PAT with read:packages.
# 4. After first CD push, set image URL to ghcr.io/YOUR_GITHUB_USERNAME/techshop-backend:latest
#
# Frontend stays on Vercel (root: frontend/, production branch: main).

services:
  - type: web
    name: techshop-backend
    runtime: image
    image:
      url: ghcr.io/YOUR_GITHUB_USERNAME/techshop-backend:latest
      creds:
        fromRegistryCreds:
          name: ghcr-techshop
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: SEPAY_ENV
        sync: false
      - key: SEPAY_MERCHANT_ID
        sync: false
      - key: SEPAY_SECRET_KEY
        sync: false
      - key: SEPAY_CHECKOUT_URL
        sync: false
      - key: SEPAY_SUCCESS_URL
        sync: false
      - key: SEPAY_ERROR_URL
        sync: false
      - key: SEPAY_CANCEL_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false

  - type: web
    name: techshop-ai
    runtime: image
    image:
      url: ghcr.io/YOUR_GITHUB_USERNAME/techshop-ai:latest
      creds:
        fromRegistryCreds:
          name: ghcr-techshop
    plan: free
    healthCheckPath: /api/v1/advisor/health
    envVars:
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: BACKEND_API_URL
        sync: false
