name: Uptime

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check production endpoints
        env:
          UPTIME_URLS: ${{ secrets.UPTIME_URLS }}
        run: |
          if [ -z "$UPTIME_URLS" ]; then
            URLS="https://tech-shop-2zf5.onrender.com/api/v1/health|https://tech-shop-psi-ecru.vercel.app"
          else
            URLS="$UPTIME_URLS"
          fi
          IFS='|' read -ra ENDPOINTS <<< "$URLS"
          failed=0
          for url in "${ENDPOINTS[@]}"; do
            [ -z "$url" ] && continue
            echo "Checking $url"
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              echo "OK ($code)"
            else
              echo "FAIL ($code)"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "One or more uptime checks failed"
            exit 1
          fi
